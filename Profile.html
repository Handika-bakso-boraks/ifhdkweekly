<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profile of Res Shoot</title>
    <style>
        /* CSS untuk mengatur tampilan agar ke tengah */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;    /* Menengahkan secara horizontal */
            justify-content: center; /* Menengahkan secara vertikal */
            min-height: 100vh;      /* Memastikan body setinggi layar */
            text-align: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: rgb(19, 141, 150); /* Bisa diganti sesuai tema VS Code */
        }

        .container {
            max-width: 700px;
            padding: 20px;
        }

        img {
            width: 350px; /* Ukuran logo yang proporsional */
            height: auto;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 42px; /* Teks judul lebih besar dan tegas */
            margin: 0 0 15px 0;
            color: #333;
        }

        p {
            font-size: 18px; /* Teks deskripsi lebih enak dibaca */
            line-height: 1.6;
            color: #555;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="wmm.png" alt="Res Shoot Logo">

        <h1>Res Shoot</h1>

        <p>
            Res shoot comes from <b>Rescue</b>, meaning of rescue people moment. 
            So the moment that may not ever happen again, but Res shoot will 
            capture that moment and make it a memories for eternity.
        </p>
    </div>

</body>
</html>
